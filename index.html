<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kojenerasyon Enerji Yönetim Sistemi</title>
    <link rel="stylesheet" href="css/giris.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <div class="logo-section">
                <img src="images/koruma_logo_1.png" alt="Koruma Logo" class="logo">
                <h1>KOJENERASYON</h1>
                <h2>Enerji Yönetim Sistemi</h2>
            </div>
            
            <form id="loginForm" class="login-form">
                <div class="form-group">
                    <label for="email">E-posta</label>
                    <input type="email" id="email" name="email" placeholder="E-posta adresinizi girin" required>
                </div>
                
                <div class="form-group">
                    <label for="password">Şifre</label>
                    <input type="password" id="password" name="password" placeholder="Şifrenizi girin" required>
                </div>
                
                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox" id="rememberMe" name="rememberMe">
                        <span>Beni hatırla</span>
                    </label>
                    <a href="#" class="forgot-password">Şifremi unuttum</a>
                </div>
                
                <button type="submit" class="login-btn">GİRİŞ YAP</button>
            </form>
            
            <div class="login-footer">
                <p>KORUMA KLOR ALKALİ ŞİRKETLER GRUBU</p>
                <p>Kojenerasyon Bölümü</p>
            </div>
        </div>
    </div>

    <script src="js/giris.js"></script>
</body>
</html>
